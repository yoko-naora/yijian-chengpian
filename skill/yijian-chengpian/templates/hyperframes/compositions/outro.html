<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  :root {
    --bg: #0a0a0b;
    --text: #f1efea;
    --accent: #FF6B35;
    --muted: rgba(241,239,234,0.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1920px; overflow: hidden;
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
  }
  .clip { position: absolute; opacity: 0; }
  .logo-text {
    font-size: 42px; font-weight: 600; color: var(--text);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 20px; color: var(--muted);
    margin-top: 8px;
  }
  .cta-btn {
    display: inline-block;
    font-size: 28px; font-weight: 600; color: #fff;
    background: var(--accent);
    padding: 18px 48px; border-radius: 40px;
  }
  .cta-text {
    font-size: 24px; color: var(--muted);
    margin-top: 24px;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="outro" data-start="0" data-duration="4"
     data-width="1080" data-height="1920">

  <!-- Logo area -->
  <div id="logo" class="clip" data-start="0" data-duration="4" data-track-index="1"
       style="top:600px; left:0; width:1080px; text-align:center;">
    <div class="logo-text">AI知識庫</div>
    <div class="logo-sub">SNS Aladdin</div>
  </div>

  <!-- Divider -->
  <div id="divider" class="clip" data-start="0.8" data-duration="3.2" data-track-index="2"
       style="top:780px; left:440px; width:200px; height:2px; background:var(--accent);">
  </div>

  <!-- CTA button area -->
  <div id="cta" class="clip" data-start="1.2" data-duration="2.8" data-track-index="3"
       style="top:840px; left:0; width:1080px; text-align:center;">
    <div class="cta-btn">关注我，每天一个AI技巧</div>
    <div class="cta-text">kb.snsaladdin.com</div>
  </div>

</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  tl.from("#logo",    { opacity: 0, y: 30, duration: 0.7 }, 0);
  tl.from("#divider", { opacity: 0, scaleX: 0, duration: 0.5, transformOrigin: "center" }, 0.8);
  tl.from("#cta",     { opacity: 0, y: 20, duration: 0.6 }, 1.2);
  window.__timelines["outro"] = tl;
</script>
</body>
</html>
