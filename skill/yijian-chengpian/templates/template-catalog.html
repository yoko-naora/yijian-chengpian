<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>一键成片 · 品类路由</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { --bg:#0d0d0d; --surface:#1a1a1a; --border:#2a2a2a; --text:#e0e0e0; --dim:#888; --accent:#002FA7; }
    *{box-sizing:border-box;margin:0;padding:0}
    body { background:var(--bg); color:var(--text); font-family:Inter,'Noto Sans SC',-apple-system,sans-serif; padding:40px 48px; -webkit-font-smoothing:antialiased; }
    header { max-width:1200px; margin:0 auto 40px; }
    header h1 { font-size:32px; font-weight:300; margin-bottom:6px; }
    header p { color:var(--dim); font-size:15px; line-height:1.6; }
    .tabs { display:flex; gap:8px; margin:28px 0; flex-wrap:wrap; }
    .tab { padding:7px 18px; border:1px solid var(--border); border-radius:20px; background:transparent; color:var(--dim); font-size:13px; cursor:pointer; font-family:inherit; transition:all .15s; }
    .tab:hover { border-color:#555; color:#ccc; }
    .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .grid { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; transition:border-color .2s; }
    .card:hover { border-color:#444; }
    .card h3 { font-size:18px; font-weight:500; margin-bottom:4px; }
    .card .sub { font-size:13px; color:var(--dim); margin-bottom:14px; }
    .badge-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .badge { padding:3px 10px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:.04em; }
    .badge.swiss { background:#002FA7; color:#fff; }
    .badge.editorial { background:#d4a04a; color:#0e0d0c; }
    .badge.palette { background:#252525; color:#aaa; font-family:'IBM Plex Mono',monospace; }
    .recipe-flow { display:flex; gap:4px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    .recipe-flow .r { padding:3px 8px; background:#222; border-radius:3px; font-size:11px; font-family:'IBM Plex Mono',monospace; color:#aaa; }
    .recipe-flow .arr { color:#555; font-size:10px; }
    .img-strategy { font-size:12px; color:var(--dim); line-height:1.5; }
    .img-strategy strong { color:#aaa; }
    .card.limited { opacity:.7; }
    .card.limited::after { content:'需用户供图'; position:absolute; top:12px; right:12px; background:#5a3e00; color:#ffbb33; padding:2px 8px; border-radius:3px; font-size:10px; }
    .card.refused { opacity:.4; pointer-events:none; }
    .card.refused .refuse-tag { color:#e55; font-size:11px; font-weight:600; }
    .section-title { max-width:1200px; margin:36px auto 16px; font-size:14px; font-weight:500; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; }
    .select-btn { margin-top:14px; width:100%; padding:8px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text); font-size:13px; cursor:pointer; font-family:inherit; transition:all .15s; }
    .select-btn:hover { background:#252525; border-color:#555; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:none; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; max-width:550px; width:90%; }
    .modal h2 { font-size:20px; margin-bottom:16px; }
    .modal pre { background:#111; padding:16px; border-radius:8px; font-size:12px; color:#a0d0a0; overflow-x:auto; line-height:1.6; margin-bottom:12px; }
    .modal .note { background:#1a2a1a; border:1px solid #2a4a2a; border-radius:8px; padding:14px; font-size:12px; color:#8c8; line-height:1.6; }
    .modal .note code { background:#222; padding:1px 5px; border-radius:3px; }
    .close-btn { margin-top:14px; padding:8px 24px; border:0; border-radius:6px; background:var(--accent); color:#fff; cursor:pointer; font-family:inherit; font-size:13px; }
    @media(max-width:768px){ body{padding:20px 16px} .grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
<header>
  <h1>一键成片 · 品类路由</h1>
  <p>选择你的内容类型，自动匹配风格、配色、版式序列、图源策略。不是让你选 28 个版式——而是告诉系统「我写什么」，系统自动配好全套。</p>
  <div class="tabs">
    <button class="tab active" data-filter="all">全部</button>
    <button class="tab" data-filter="swiss">Swiss 网格风</button>
    <button class="tab" data-filter="editorial">Editorial 杂志风</button>
  </div>
</header>

<div class="section-title">✅ 明确支持（7 个品类，端到端质量最好）</div>
<div class="grid" id="grid-supported"></div>

<div class="section-title">⚠️ 可以接，但需要你提供图片（5 个品类）</div>
<div class="grid" id="grid-limited"></div>

<div class="section-title">🚫 不接（明确告知，建议用其他工具）</div>
<div class="grid" id="grid-refused"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <pre id="modalConfig"></pre>
    <div class="note" id="modalNote"></div>
    <button class="close-btn" id="btnClose">关闭</button>
  </div>
</div>

<script>
const CATEGORIES = [
  // === 明确支持 ===
  { id:"travel", name:"旅行 / 生活方式", sub:"攻略、游记、户外、探店", style:"editorial", palette:"kraft-paper / dune / forest-ink",
    recipes:["M01/M16","M02","M11","M07"], recipeLabels:["封面","现场照","旁注","收官"],
    img:"用户照片 > Pexels(中文) > Unsplash > Flickr CC",
    tier:"supported",
    note:"封面大图压字需 quiet zone 检查。别写成「X市必去8大景点」列表体——用具体日期/天气/里程锚定真实感。" },
  { id:"workplace", name:"职场 / 干货 / 商业", sub:"效率、管理、商业思考、AI工具", style:"swiss", palette:"IKB Blue / Safety Orange",
    recipes:["S01","S05","S06","S07"], recipeLabels:["封面","痛点","流程","总结"],
    img:"截图优先 > 图示 > Unsplash(科技)。不用商务 stock photo。",
    tier:"supported",
    note:"Swiss 网格风最适合干货。避免「8个让你…」列表体——每行做可证伪的论断，而不是鸡汤。" },
  { id:"product", name:"产品测评 / 数码", sub:"对比、横评、推荐、开箱", style:"swiss", palette:"IKB Blue",
    recipes:["S01","S02","S10","S03","S07"], recipeLabels:["封面","对比","排行","参数","总结"],
    img:"截图优先(设备框美化) > Unsplash(产品/科技)",
    tier:"supported",
    note:"截图用 .frame-shot + .device-browser 四件套美化。不编造假数据。" },
  { id:"reading", name:"读书 / 笔记", sub:"书单、阅读笔记、读后感", style:"editorial", palette:"ink-classic / dune",
    recipes:["M01","M04","M11","M07"], recipeLabels:["封面","引语","旁注","收官"],
    img:"用户拍书封/内页 > Unsplash(阅读场景) > Pexels",
    tier:"supported",
    note:"衬线字体 + 引文居中 + 留白拉满。不堆书名列表——每本配一句具体的读后感。" },
  { id:"food", name:"美食 / 食谱", sub:"做菜、烘焙、食谱教程", style:"editorial", palette:"kraft-paper",
    recipes:["M16","S11","M14","M02"], recipeLabels:["成品封面","食材清单","步骤流程","细节特写"],
    img:"用户菜品照(必须) > Pexels(中式食材) > Unsplash",
    tier:"supported",
    note:"成品照是灵魂。俯拍优先，文字向四角让位。别喊「超绝!!!」——让菜说话。" },
  { id:"film", name:"影视 / 文化", sub:"影评、剧评、文化评论", style:"editorial", palette:"ink-classic / indigo-porcelain",
    recipes:["M04","M10","M11","S12"], recipeLabels:["引语封面","场景分析","旁注","矩阵总结"],
    img:"官方海报/剧照 > Wallhaven。不生成假剧照。",
    tier:"supported",
    note:"Letterboxd 式克制排版。有剧透在 kicker 标「剧透」。不加假电影节徽章。" },
  { id:"tutorial", name:"教程 / How-to", sub:"操作指南、步骤教程、入门指南", style:"swiss", palette:"IKB Blue / Lemon Green",
    recipes:["S01","S06","S02","S07"], recipeLabels:["封面","步骤","对比","总结"],
    img:"截图优先(设备框) > 图示 > Unsplash",
    tier:"supported",
    note:"每步一个操作 + 一个结果。12 屏以内。" },

  // === 需用户供图 ===
  { id:"game", name:"🎮 游戏", sub:"游戏评测、攻略、Build分享", style:"editorial", palette:"midnight-ink",
    recipes:["M01","M08","S07","M15"], recipeLabels:["封面","排行","总结","前后对比"],
    img:"Wallhaven > 官方截图。版权风险需用户确认。",
    tier:"limited", limitNote:"游戏主视觉图有版权风险，需你判断是否可用。" },
  { id:"makeup", name:"💄 彩妆", sub:"产品测评、教程、色号对比", style:"swiss", palette:"Lemon Yellow / Lemon Green",
    recipes:["M14","S12","S11","S02"], recipeLabels:["步骤","矩阵","清单","对比"],
    img:"用户产品图/试色照(必须)。不出人像。",
    tier:"limited", limitNote:"需要你提供产品图或试色照片。" },
  { id:"fitness", name:"🏋 健身", sub:"训练计划、营养数据、进度分享", style:"swiss", palette:"Safety Orange / Lemon Green",
    recipes:["M14","S11","S09","M15"], recipeLabels:["训练流程","组次清单","周量统计","前后对比"],
    img:"用户训练照/数据截图(必须)。不编造假数据。",
    tier:"limited", limitNote:"需要你提供训练照片或数据截图。" },
  { id:"home", name:"🏠 家居", sub:"好物推荐、改造前后、户型分析", style:"editorial", palette:"kraft-paper / dune",
    recipes:["M16","S11","M02","M15"], recipeLabels:["封面","物品清单","细节图","前后对比"],
    img:"用户实拍(强烈建议)。Pinterest搜图版权风险高。",
    tier:"limited", limitNote:"最好有你家的实拍图，网上搜图风险高。" },
  { id:"outfit", name:"👔 穿搭", sub:"胶囊衣橱、单品推荐、风格笔记", style:"editorial", palette:"ink-classic / indigo-porcelain",
    recipes:["M11","S12","M04","S11"], recipeLabels:["旁注","矩阵","引语","清单"],
    img:"用户穿搭照(必须)。不生成人像。不超6件单品。",
    tier:"limited", limitNote:"OOTD全身照不是我们的能力范围。可做单品推荐清单。" },

  // === 明确不接 ===
  { id:"refused-fan", name:"追星 / 粉丝向", sub:"需要饭圈美学体系", tier:"refused", refuseNote:"视觉语言完全不同，建议找专门的粉丝内容工具。" },
  { id:"refused-ad", name:"纯促销硬广", sub:"违背内容性设计哲学", tier:"refused", refuseNote:"硬广视觉效果不是我们的方向，出来的东西会像模板套的。" },
  { id:"refused-ootd", name:"OOTD 日常穿搭", sub:"无法生成人像照片", tier:"refused", refuseNote:"我们不出人像。单品推荐清单可以做。" },
  { id:"refused-dreamcore", name:"梦核 / 氛围感 / Y2K", sub:"和 Swiss/Editorial 系统冲突", tier:"refused", refuseNote:"装饰性渐变、发光椭圆、贴纸——我们明确不碰。" },
  { id:"refused-long", name:"超 12 屏长教程", sub:"图文不是最优载体", tier:"refused", refuseNote:"考虑做视频(路径C)。长教程拆成多篇图文也容易流失。" },
  { id:"refused-food-photo", name:"菜品大片摆盘", sub:"无法替代专业美食摄影", tier:"refused", refuseNote:"食谱可以做。纯菜品展示不是我们的能力。" },
];

function renderCards(filter) {
  ['grid-supported','grid-limited','grid-refused'].forEach(id => document.getElementById(id).innerHTML = '');

  CATEGORIES.forEach(c => {
    if (filter && filter!=='all' && c.style!==filter) return;
    const card = document.createElement('div');
    card.className = 'card' + (c.tier==='limited'?' limited':'') + (c.tier==='refused'?' refused':'');

    let html = '';
    if (c.tier === 'refused') {
      html = `<h3>${c.name}</h3><div class="sub">${c.sub}</div><p class="refuse-tag">不接 — ${c.refuseNote}</p>`;
    } else {
      const styleBadge = c.style==='swiss' ? '<span class="badge swiss">Swiss 网格</span>' : '<span class="badge editorial">Editorial 杂志</span>';
      const recipeFlow = c.recipes.map((r,i) => {
        let seg = `<span class="r">${r}</span>`;
        if (i<c.recipes.length-1) seg += `<span class="arr">→</span>`;
        return seg;
      }).join('');
      const recipeLabels = c.recipeLabels.join(' → ');

      html = `
        <h3>${c.name}</h3>
        <div class="sub">${c.sub}</div>
        <div class="badge-row">
          ${styleBadge}
          <span class="badge palette">${c.palette}</span>
        </div>
        <div class="recipe-flow">${recipeFlow}</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:8px">${recipeLabels}</div>
        <div class="img-strategy"><strong>图源：</strong>${c.img}</div>
        ${c.limitNote ? `<div class="img-strategy" style="color:#d90;margin-top:6px">⚠ ${c.limitNote}</div>` : ''}
        <button class="select-btn">查看配置</button>`;
    }
    card.innerHTML = html;

    if (c.tier !== 'refused') {
      card.querySelector('.select-btn').addEventListener('click', () => showConfig(c));
    }

    if (c.tier === 'supported') document.getElementById('grid-supported').appendChild(card);
    else if (c.tier === 'limited') document.getElementById('grid-limited').appendChild(card);
    else document.getElementById('grid-refused').appendChild(card);
  });
}

function showConfig(c) {
  document.getElementById('modalTitle').textContent = c.name;
  const config = {
    category: c.id,
    name: c.name,
    style: c.style,
    palette: c.palette,
    recipes: c.recipes,
    imageStrategy: c.img
  };
  document.getElementById('modalConfig').textContent = JSON.stringify(config, null, 2);
  document.getElementById('modalNote').innerHTML = `
    <strong>📝 使用说明</strong><br>
    将此配置告诉 Claude：「一键成片：{你的选题}，品类：${c.name}」<br><br>
    <strong>不满意？修改三维度：</strong><br>
    · <code>"style"</code> — <code>"swiss"</code> ↔ <code>"editorial"</code><br>
    · 配色 — Swiss: <code>ikb</code> / <code>lemon-yellow</code> / <code>lemon-green</code> / <code>safety-orange</code><br>
    · 配色 — Editorial: <code>ink-classic</code> / <code>indigo-porcelain</code> / <code>forest-ink</code> / <code>kraft-paper</code> / <code>dune</code> / <code>midnight-ink</code><br>
    · <code>"recipes"</code> 数组 — 换掉某张卡：Swiss用S01-S12，Editorial用M01-M16<br><br>
    <strong>💡 ${c.note || ''}</strong>
  `;
  document.getElementById('modal').classList.add('show');
}

document.getElementById('btnClose').addEventListener('click', () => document.getElementById('modal').classList.remove('show'));
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('show'); });

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderCards(tab.dataset.filter);
  });
});

renderCards('all');
</script>
</body>
</html>
